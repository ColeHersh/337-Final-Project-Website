<!DOCTYPE html>
<html>
    <head>
        <title>User Profile</title>
        <link rel="stylesheet" href="/style.css">
        <script>
            /**
            * This function makes the request to the server to the user's information.
            * It uses the session token to validate the user and session then sends the data back
            */
            function getProfileInfo(){
                fetch("/getProfileInfo?token=" + localStorage.getItem("token") + "&username=" + localStorage.getItem("username"))
                .then(response => response.json())
                .then(data => {
                    // Update the profile information on the page

                    if(!data.success){
                        alert("Session expired or invalid. Please log in again.");
                        window.location.href = "/login";
                        return;
                    }
                    document.getElementById("title").innerText = "Welcome to All Movies " + localStorage.getItem("username") + "!";
                    document.getElementById("bio").value = data.bio;
                    document.getElementById("favorite").innerText = "Favoirte Movie: "+ data.favorite;
                    document.getElementById("averageRating").innerText = "Average Rating: " + data.averageRating;
                })
                .catch(error => {
                    console.error("Error:", error);
                });

            }
            function editBio() {
                var bioTextarea = document.getElementById("bio");
                var button = document.getElementById("editBioBtn");
                if(bioTextarea.readOnly){
                    bioTextarea.readOnly = false;
                    //bioTextarea.focus();
                    button.innerText = "Save Bio";
                }
                else{
                    bioTextarea.readOnly = true;
                    button.innerText = "Edit Bio";
                    // send fetch with updated info to server as get
                    fetch("/updateBio", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            username: localStorage.getItem("username"),
                            newBio: bioTextarea.value
                        })
                    })
                    .then(response => response.json())
                    .then(data => {
                        if(!data.success){
                            alert("Failed to update bio. Please try again.");
                        }
                    })
                    .catch(error => {
                        console.error("Error:", error);
                    })
                }
            }
            function logout() {
                fetch("/logout?username=" + localStorage.getItem("username"))
                .then(response => response.json())
                .then(data => {
                    localStorage.removeItem("token");
                    localStorage.removeItem("username");
                    window.location.href = "/login";
                })
                .catch(error => {
                    console.error("Error:", error);
                });
            }
            function deleteAccount() {
                if(!confirm("Are you sure you want to delete your account? This action cannot be undone.")){
                    return;
                }
                fetch("/deleteAccount?username=" + localStorage.getItem("username"))
                .then(response => response.json())
                .then(data => {
                    localStorage.removeItem("token");
                    localStorage.removeItem("username");
                    window.location.href = "/login";
                })
                .catch(error => {
                    console.error("Error:", error);
                });
            }
        </script>
    </head>
    <header>
        <h2><span> ALL MOVIES </span> <span><a class="header" href="">Profile</a></span><span><a class="header" href="/movies">Movies</a></span><span><a class="header" href="/account">Watchlist</a></span></h2>
    </header>
    <body onload="getProfileInfo()">
        <h1 id="title" style="margin-left:40%">Welcome to All Movies!</h1>
        <div style="display: flex; align-items: flex-start; gap: 5%; width: 100%;">
            <div style="display: flex; flex-direction: column; gap: 10px; margin-left: 2%;margin-top: 15px; min-width: 100px;">
                <label for="bio" style="font-weight: bold; font-size: 30px;">Bio</label>
                <button id="editBioBtn" style="width: fit-content; padding: 5px 10px;" onclick="editBio()">Edit Bio</button>
            </div>
            <textarea id="bio" style="width: 70%; height: 100px; resize: none;" maxlength="300" readonly></textarea>
        </div>
        <br>
        
        <p id="favorite">Favorite Movie:</p>
        <p id="averageRating">Average Rating:</p>
        <button onclick="logout()">Logout</button><br><br>
        <button style="background-color: red;" onclick="deleteAccount()">Delete Account</button>
    </body>
</html>
