<!DOCTYPE html>
<html>
    <head>
        <title>Login Page</title>
        <link rel="stylesheet" href="/style.css">
        <style>
            label{
                font-weight: bold;
                font-size: 20px;
            }
        </style>
        <script>
            function loginReq(){
                var username = document.getElementById("username").value;
                var password = document.getElementById("password").value;
                fetch("/loginAuth", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({username: username, password: password})
                })
                .then(response => response.json())
                .then(data => { 
                    if(data.success){
                        localStorage.setItem("token", data.token);
                        localStorage.setItem("username", username);
                        window.location.href = "/profile";
                    }
                    else{
                        document.getElementById("errorMsg").innerText = data.message;
                    }
                })
                .catch(error => {
                    console.error("Error:", error);
                    document.getElementById("errorMsg").innerText = "An error occurred. Please try again.";
                });
            }
        </script>
    </head>
    <body style="align-items:center">
        <div class="center-container">
            <h1>Login to All Movies</h1>
            <p>Please enter your username and password to log in</p>
            <a href="/createUser">Don't have an account? Sign up here</a>
            <p id="errorMsg" style="color:red;"></p>
            <br><br><br>
            <form action="" method="post">
                <label for="username">Username</label><br>
                <input type="text" id="username" name="username" required><br><br>
                <label for="password">Password</label><br>
                <input type="password" id="password" name="password" required><br><br>
                <input style="margin-left: 150px;" type="button" value="Login" onclick="loginReq()">
            </form>
        </div>
    </body>
</html>
